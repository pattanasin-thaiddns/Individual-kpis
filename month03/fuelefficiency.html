<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Efficiency Dashboard - Pattanasin Thai Trading</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Recharts -->
    <script src="https://unpkg.com/prop-types@15.6.2/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #1e293b;
        }

        /* Light Glassmorphism Base Class */
        .glass-panel {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
            border-radius: 1.25rem;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.8); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, LineChart, Line, ReferenceLine, ComposedChart } = window.Recharts;

        // --- Data ---
        const rawData = [
            { id: 1, plate: '84-5551 อด', carName: 'บุญหนัก', driver: 'วิชัย', target: 7.00, actual: 8.04, liter: 228.88, baht: 7020.00, distance: 1840.00, bahtPerKm: 3.82, sales: 306451.00, salesPct: 2.29 },
            { id: 2, plate: '84-3178 อด', carName: 'ทำเงิน', driver: 'บูรพา', target: 6.80, actual: 6.23, liter: 749.34, baht: 23530.10, distance: 4672.00, bahtPerKm: 5.04, sales: 3236785.88, salesPct: 0.73 },
            { id: 3, plate: '83-9195 อด', carName: 'พี่หมาน', driver: 'ใย', target: 8.70, actual: 8.36, liter: 748.59, baht: 23730.00, distance: 6259.31, bahtPerKm: 3.79, sales: 3133523.71, salesPct: 0.76 },
            { id: 4, plate: '84-1902 อด', carName: 'นำโชค', driver: 'เรืองยศ', target: 9.50, actual: 9.82, liter: 587.60, baht: 18217.00, distance: 5773.00, bahtPerKm: 3.16, sales: 2969988.00, salesPct: 0.61 },
            { id: 5, plate: '2ฒข 2585 กทม.', carName: 'ออมสิน', driver: 'ไม่ระบุ', target: 11.80, actual: 14.20, liter: 394.84, baht: 12239.90, distance: 5608.54, bahtPerKm: 2.18, sales: 1581829.75, salesPct: 0.77 }
        ];

        const trendData = [
            { month: 'ม.ค.', 'วิชัย (บุญหนัก)': 6.74, 'บูรพา (ทำเงิน)': 7.07, 'ใย (พี่หมาน)': 8.52, 'เรืองยศ (นำโชค)': 8.83, 'ออมสิน': 10.61 },
            { month: 'ก.พ.', 'วิชัย (บุญหนัก)': 6.89, 'บูรพา (ทำเงิน)': 7.58, 'ใย (พี่หมาน)': 9.10, 'เรืองยศ (นำโชค)': 9.28, 'ออมสิน': 12.01 },
            { month: 'มี.ค.', 'วิชัย (บุญหนัก)': 8.04, 'บูรพา (ทำเงิน)': 6.23, 'ใย (พี่หมาน)': 8.36, 'เรืองยศ (นำโชค)': 9.82, 'ออมสิน': 14.20 }
        ];

        // --- Icons (Inline SVG) ---
        const Icons = {
            TrendingUp: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>,
            TrendingDown: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 17h8m0 0v-8m0 8l-8-8-4 4-6-6"></path></svg>,
            GasPump: () => <svg className="w-6 h-6 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>,
            Road: () => <svg className="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>,
            Money: () => <svg className="w-6 h-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>,
            Chart: () => <svg className="w-6 h-6 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>,
            AlertCircle: () => <svg className="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>,
            CheckCircle: () => <svg className="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>,
            User: () => <svg className="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>,
            Truck: () => <svg className="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
        };

        const App = () => {
            // Calculated Totals
            const totalLiter = rawData.reduce((sum, item) => sum + item.liter, 0);
            const totalBaht = rawData.reduce((sum, item) => sum + item.baht, 0);
            const totalKm = rawData.reduce((sum, item) => sum + item.distance, 0);
            const totalSales = rawData.reduce((sum, item) => sum + item.sales, 0);
            const avgKmPerLiter = totalKm / totalLiter;
            const avgBahtPerKm = totalBaht / totalKm;

            const formatNumber = (num, decimals = 2) => num.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });

            const CustomTooltip = ({ active, payload, label }) => {
                if (active && payload && payload.length) {
                    return (
                        <div className="glass-panel p-3 text-sm">
                            <p className="font-bold mb-2">{label}</p>
                            {payload.map((entry, index) => (
                                <p key={index} style={{ color: entry.color }}>
                                    {entry.name}: {entry.value} km/L
                                </p>
                            ))}
                        </div>
                    );
                }
                return null;
            };

            return (
                <div className="max-w-7xl mx-auto space-y-6">
                    {/* Header Section */}
                    <header className="glass-panel p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xl">P</div>
                                <div>
                                    <h1 className="text-2xl font-bold text-slate-800">รายงานประสิทธิภาพการใช้เชื้อเพลิง</h1>
                                    <p className="text-sm text-slate-500">บริษัท พัฒนาสิน ไทยเทรดดิ้ง จำกัด | ประจำเดือน มีนาคม 2026</p>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* KPI Summary Cards */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div className="glass-panel p-5 flex items-center gap-4 border-l-4 border-l-orange-500">
                            <div className="p-3 bg-orange-100 rounded-full"><Icons.GasPump /></div>
                            <div>
                                <p className="text-sm text-slate-500 font-medium">ค่าน้ำมันรวม (บาท)</p>
                                <p className="text-2xl font-bold text-slate-800">{formatNumber(totalBaht)}</p>
                                <p className="text-xs text-slate-400 mt-1">ปริมาณรวม {formatNumber(totalLiter)} ลิตร</p>
                            </div>
                        </div>
                        <div className="glass-panel p-5 flex items-center gap-4 border-l-4 border-l-blue-500">
                            <div className="p-3 bg-blue-100 rounded-full"><Icons.Road /></div>
                            <div>
                                <p className="text-sm text-slate-500 font-medium">ระยะทางรวม (km)</p>
                                <p className="text-2xl font-bold text-slate-800">{formatNumber(totalKm)}</p>
                                <p className="text-xs text-slate-400 mt-1">เฉลี่ย {formatNumber(avgBahtPerKm)} บาท/กม.</p>
                            </div>
                        </div>
                        <div className="glass-panel p-5 flex items-center gap-4 border-l-4 border-l-purple-500">
                            <div className="p-3 bg-purple-100 rounded-full"><Icons.Chart /></div>
                            <div>
                                <p className="text-sm text-slate-500 font-medium">ค่าเฉลี่ยรวม (km/L)</p>
                                <p className="text-2xl font-bold text-slate-800">{formatNumber(avgKmPerLiter)}</p>
                                <p className="text-xs text-emerald-500 mt-1 flex items-center gap-1">
                                    <Icons.TrendingUp /> เกณฑ์โดยรวมถือว่าดี
                                </p>
                            </div>
                        </div>
                        <div className="glass-panel p-5 flex items-center gap-4 border-l-4 border-l-emerald-500">
                            <div className="p-3 bg-emerald-100 rounded-full"><Icons.Money /></div>
                            <div>
                                <p className="text-sm text-slate-500 font-medium">ยอดขายรวม (บาท)</p>
                                <p className="text-2xl font-bold text-slate-800">{formatNumber(totalSales)}</p>
                                <p className="text-xs text-slate-400 mt-1">ค่าน้ำมันคิดเป็น 0.75% ของยอดขาย</p>
                            </div>
                        </div>
                    </div>

                    {/* Chart Section */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {/* Bar Chart: Target vs Actual */}
                        <div className="glass-panel p-6">
                            <h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                                <span className="w-2 h-6 bg-blue-500 rounded-full inline-block"></span>
                                เปรียบเทียบประสิทธิภาพจริง VS เป้าหมาย (มี.ค.)
                            </h2>
                            <div className="h-72 w-full">
                                <ResponsiveContainer width="100%" height="100%">
                                    <ComposedChart data={rawData} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="rgba(0,0,0,0.05)" />
                                        <XAxis dataKey="carName" tick={{ fill: '#64748b', fontSize: 12 }} axisLine={false} tickLine={false} />
                                        <YAxis tick={{ fill: '#64748b', fontSize: 12 }} axisLine={false} tickLine={false} />
                                        <Tooltip content={<CustomTooltip />} />
                                        <Legend wrapperStyle={{ fontSize: '12px' }} />
                                        <Bar dataKey="actual" name="ทำได้จริง (km/L)" fill="#3b82f6" radius={[4, 4, 0, 0]} maxBarSize={40} />
                                        <Line type="monotone" dataKey="target" name="เป้าหมาย (km/L)" stroke="#ef4444" strokeWidth={2} dot={{ r: 4, fill: '#ef4444' }} />
                                    </ComposedChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* Line Chart: Trend */}
                        <div className="glass-panel p-6">
                            <h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                                <span className="w-2 h-6 bg-purple-500 rounded-full inline-block"></span>
                                แนวโน้มพฤติกรรมการขับขี่ (ม.ค. - มี.ค.)
                            </h2>
                            <div className="h-72 w-full">
                                <ResponsiveContainer width="100%" height="100%">
                                    <LineChart data={trendData} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="rgba(0,0,0,0.05)" />
                                        <XAxis dataKey="month" tick={{ fill: '#64748b', fontSize: 12 }} axisLine={false} tickLine={false} />
                                        <YAxis tick={{ fill: '#64748b', fontSize: 12 }} axisLine={false} tickLine={false} />
                                        <Tooltip content={<CustomTooltip />} />
                                        <Legend wrapperStyle={{ fontSize: '12px' }} />
                                        <Line type="monotone" dataKey="วิชัย (บุญหนัก)" stroke="#10b981" strokeWidth={2} />
                                        <Line type="monotone" dataKey="บูรพา (ทำเงิน)" stroke="#ef4444" strokeWidth={3} dot={{ r: 5 }} /> {/* Highlighted */}
                                        <Line type="monotone" dataKey="ใย (พี่หมาน)" stroke="#f59e0b" strokeWidth={2} />
                                        <Line type="monotone" dataKey="เรืองยศ (นำโชค)" stroke="#3b82f6" strokeWidth={2} />
                                    </LineChart>
                                </ResponsiveContainer>
                            </div>
                        </div>
                    </div>

                    {/* Data Table: Separated Vehicle & Driver */}
                    <div className="glass-panel overflow-hidden">
                        <div className="p-5 border-b border-white/50 bg-white/30 flex justify-between items-center">
                            <h2 className="text-lg font-bold text-slate-800">ข้อมูลรายบุคคลและยานพาหนะ (มี.ค. 26)</h2>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm text-left">
                                <thead className="bg-slate-50/50 text-slate-600 font-semibold border-b border-white/50">
                                    <tr>
                                        <th className="px-4 py-3">รถ / ทะเบียน</th>
                                        <th className="px-4 py-3 border-r border-white/50">พนักงานขับรถ</th>
                                        <th className="px-4 py-3 text-right">เป้าหมาย<br/><span className="text-xs font-normal">(km/L)</span></th>
                                        <th className="px-4 py-3 text-right">ทำได้จริง<br/><span className="text-xs font-normal">(km/L)</span></th>
                                        <th className="px-4 py-3 text-center">สถานะ</th>
                                        <th className="px-4 py-3 text-right">ต้นทุน<br/><span className="text-xs font-normal">(บาท/km)</span></th>
                                        <th className="px-4 py-3 text-right">ยอดขาย<br/><span className="text-xs font-normal">(บาท)</span></th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-white/50">
                                    {rawData.map((row) => {
                                        const isPass = row.actual >= row.target;
                                        return (
                                            <tr key={row.id} className="hover:bg-white/40 transition-colors">
                                                <td className="px-4 py-3">
                                                    <div className="flex items-center gap-2">
                                                        <Icons.Truck />
                                                        <div>
                                                            <div className="font-semibold text-slate-800">{row.carName}</div>
                                                            <div className="text-xs text-slate-500">{row.plate}</div>
                                                        </div>
                                                    </div>
                                                </td>
                                                <td className="px-4 py-3 border-r border-white/50">
                                                    <div className="flex items-center gap-2">
                                                        <Icons.User />
                                                        <span className="font-medium text-blue-700">{row.driver}</span>
                                                    </div>
                                                </td>
                                                <td className="px-4 py-3 text-right text-slate-500">{formatNumber(row.target)}</td>
                                                <td className={`px-4 py-3 text-right font-bold ${isPass ? 'text-emerald-600' : 'text-rose-600'}`}>
                                                    {formatNumber(row.actual)}
                                                </td>
                                                <td className="px-4 py-3 text-center">
                                                    {isPass ? 
                                                        <span className="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-800">
                                                            <Icons.CheckCircle /> ผ่านเกณฑ์
                                                        </span> : 
                                                        <span className="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium bg-rose-100 text-rose-800">
                                                            <Icons.AlertCircle /> ต่ำกว่าเป้า
                                                        </span>
                                                    }
                                                </td>
                                                <td className="px-4 py-3 text-right font-medium text-slate-700">{formatNumber(row.bahtPerKm)}</td>
                                                <td className="px-4 py-3 text-right text-slate-600">{formatNumber(row.sales)}</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Analysis & Recommendations */}
                    <div className="glass-panel p-6">
                        <h2 className="text-xl font-bold text-slate-800 mb-4 border-b border-slate-200 pb-2">วิเคราะห์พฤติกรรมและข้อเสนอแนะ</h2>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {/* Issues */}
                            <div className="bg-rose-50/50 p-4 rounded-xl border border-rose-100">
                                <h3 className="font-bold text-rose-700 flex items-center gap-2 mb-3">
                                    <Icons.TrendingDown /> จุดที่ต้องปรับปรุงด่วน
                                </h3>
                                <ul className="space-y-3 text-sm text-slate-700">
                                    <li className="flex items-start gap-2">
                                        <span className="text-rose-500 mt-0.5">•</span>
                                        <div>
                                            <strong>คุณบูรพา (รถทำเงิน):</strong> ประสิทธิภาพลดลงอย่างเห็นได้ชัดจากเดือน ก.พ. (7.58) เหลือเพียง <strong>6.23 km/L</strong> ในเดือน มี.ค. ซึ่งต่ำกว่าเป้า (6.80) ทำให้มีต้นทุนต่อกิโลเมตรสูงสุดที่ <strong>5.04 บาท/km</strong>
                                            <p className="mt-1 text-rose-600 text-xs bg-rose-100 p-2 rounded">
                                                *เสนอแนะ: ควรพูดคุยเพื่อหาสาเหตุ เช่น การติดเครื่องเดินเบาทิ้งไว้, การเหยียบคันเร่งกระชาก, หรือวิ่งนอกเส้นทางที่รถติดหรือไม่ รวมถึงตรวจเช็คสภาพรถร่วมด้วย
                                            </p>
                                        </div>
                                    </li>
                                    <li className="flex items-start gap-2">
                                        <span className="text-rose-500 mt-0.5">•</span>
                                        <div>
                                            <strong>คุณใย (รถพี่หมาน):</strong> ประสิทธิภาพลดลงเล็กน้อยจากเดือน ก.พ. (9.10) มาอยู่ที่ 8.36 km/L ซึ่งหลุดจากเป้าหมาย (8.70) ควรเฝ้าระวังไม่ให้ลดลงไปกว่านี้
                                        </div>
                                    </li>
                                </ul>
                            </div>

                            {/* Good Points */}
                            <div className="bg-emerald-50/50 p-4 rounded-xl border border-emerald-100">
                                <h3 className="font-bold text-emerald-700 flex items-center gap-2 mb-3">
                                    <Icons.TrendingUp /> จุดเด่นและแนวทางเชิงบวก
                                </h3>
                                <ul className="space-y-3 text-sm text-slate-700">
                                    <li className="flex items-start gap-2">
                                        <span className="text-emerald-500 mt-0.5">•</span>
                                        <div>
                                            <strong>คุณวิชัย (รถบุญหนัก) & คุณเรืองยศ (รถนำโชค):</strong> มีพัฒนาการการขับขี่ที่ดีขึ้นอย่างต่อเนื่องตั้งแต่เดือน ม.ค. จนสามารถทำประสิทธิภาพ <strong>ทะลุเป้าหมาย</strong> ได้ในเดือน มี.ค.
                                            <p className="mt-1 text-emerald-600 text-xs bg-emerald-100 p-2 rounded">
