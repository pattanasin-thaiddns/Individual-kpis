<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Dashboard - บริษัท พัฒนาสิน ไทยเทรดดิ้ง จำกัด</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Prompt -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Prompt', sans-serif;
            /* พื้นหลังสีอ่อน สบายตา เหมาะสำหรับ Glassmorphism */
            background: linear-gradient(135deg, #e0f2fe 0%, #f3e8ff 50%, #fce7f3 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #334155;
            position: relative;
            overflow-x: hidden;
        }

        /* Abstract blobs in background */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: float 10s ease-in-out infinite;
        }
        .blob-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: #bae6fd; border-radius: 50%; }
        .blob-2 { bottom: -10%; right: -10%; width: 600px; height: 600px; background: #e9d5ff; border-radius: 50%; animation-delay: -5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        /* Glassmorphism Classes */
        .glass {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
        }
        
        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.9);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .glass-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            background: rgba(255, 255, 255, 0.85);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <!-- Background Decor -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- Header -->
    <header class="glass-header sticky top-0 z-50 px-6 py-4 mb-8">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-xl bg-blue-600 text-white flex items-center justify-center shadow-lg">
                    <i data-lucide="bar-chart-2" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-bold text-gray-800">Performance Dashboard</h1>
                    <p class="text-sm text-gray-500">บริษัท พัฒนาสิน ไทยเทรดดิ้ง จำกัด</p>
                </div>
            </div>
            <div class="flex items-center gap-3 flex-wrap justify-center">
                <a href="../index.html" class="bg-blue-600 hover:bg-blue-700 text-white shadow-lg shadow-blue-600/30 px-5 py-2.5 rounded-full flex items-center gap-2 transition-all duration-200 hover:-translate-y-0.5 no-underline">
                    <i data-lucide="home" class="w-4 h-4 text-white"></i>
                    <span class="font-medium text-sm">กลับสู่หน้าหลัก (Dashboard รวม)</span>
                </a>
                <div class="glass px-5 py-2 rounded-full flex items-center gap-2">
                    <i data-lucide="calendar" class="w-4 h-4 text-blue-600"></i>
                    <span class="font-semibold text-gray-700 text-sm md:text-base">ประจำเดือน: มีนาคม 2026</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-12">
        
        <!-- Top Stats Row -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass rounded-2xl p-6 flex items-center gap-4">
                <div class="w-12 h-12 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center">
                    <i data-lucide="target" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-sm text-gray-500 font-medium">จำนวน KPI ทั้งหมด</p>
                    <h3 class="text-2xl font-bold text-gray-800">28 <span class="text-base font-normal text-gray-500">รายการ</span></h3>
                </div>
            </div>
            <div class="glass rounded-2xl p-6 flex items-center gap-4">
                <div class="w-12 h-12 rounded-full bg-green-100 text-green-600 flex items-center justify-center">
                    <i data-lucide="check-circle" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-sm text-gray-500 font-medium">ผ่านเกณฑ์ (Passed)</p>
                    <h3 class="text-2xl font-bold text-green-600" id="stat-passed">-</h3>
                </div>
            </div>
            <div class="glass rounded-2xl p-6 flex items-center gap-4">
                <div class="w-12 h-12 rounded-full bg-red-100 text-red-600 flex items-center justify-center">
                    <i data-lucide="alert-circle" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-sm text-gray-500 font-medium">ต้องปรับปรุง (Needs Work)</p>
                    <h3 class="text-2xl font-bold text-red-500" id="stat-failed">-</h3>
                </div>
            </div>
        </div>

        <!-- Chart Section -->
        <div class="glass rounded-3xl p-6 mb-10 shadow-sm">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                    <i data-lucide="trending-up" class="w-5 h-5 text-blue-600"></i>
                    ภาพรวมยอดขายหลักเทียบเป้าหมาย (บาท)
                </h2>
            </div>
            <div class="relative h-72 w-full">
                <canvas id="salesChart"></canvas>
            </div>
        </div>

        <!-- KPI Categories Container -->
        <div id="kpi-container" class="space-y-10">
            <!-- JavaScript will populate categories here -->
        </div>

    </main>

    <!-- Script to render data -->
    <script>
        // Initialize Icons
        lucide.createIcons();

        // Data Structure (Extracted from the provided image for March 2026)
        // type: 'more' (>= target is good), 'less' (<= target is good)
        const kpiData = [
            // --- หมวดหมู่: ยอดขาย (Sales) ---
            { id: 1, category: "Sales", title: "ยอดขายออนไลน์", person: "ผู้จัดการฝ่ายบริหาร", target: 650000, actual: 1191760, unit: "บาท", type: "more" },
            { id: 2, category: "Sales", title: "ยอดขายสินค้าใหม่", person: "ผจก.ฝ่ายบริหาร/จัดซื้อ", target: 650000, actual: 100610, unit: "บาท", type: "more" },
            { id: 4, category: "Sales", title: "ยอดขายลูกค้าใหม่เพิ่มขึ้น", person: "ผู้จัดการฝ่ายปฏิบัติการ", target: 1500000, actual: 34730, unit: "บาท", type: "more" },
            { id: 6, category: "Sales", title: "ยอดขายปลีกหน้าร้าน", person: "หัวหน้าแผนกขาย/พนักงานขายปลีก", target: 600000, actual: 467577, unit: "บาท", type: "more" },
            { id: 8, category: "Sales", title: "ยอดขายส่ง", person: "หัวหน้าแผนกขาย/พนักงานขายส่ง", target: 12800000, actual: 12592895, unit: "บาท", type: "more" },
            { id: 9, category: "Sales", title: "ยอดขาย-หนองคาย", person: "หัวหน้าแผนกขาย/พนักงานขาย-หนองคาย", target: 600000, actual: 828356.35, unit: "บาท", type: "more" },

            // --- หมวดหมู่: การดำเนินงาน & คลังสินค้า (Operations & Inventory) ---
            { id: 3, category: "Operations", title: "อบรมพนักงานให้มีความรู้", person: "ผู้จัดการฝ่ายบริหาร", target: 90, actual: 0, unit: "%", type: "more" },
            { id: 5, category: "Operations", title: "ติดตามการชำระหนี้", person: "หัวหน้าแผนกบัญชี/พนักงานบัญชี", target: 80, actual: 84.73, unit: "%", type: "more" },
            { id: 7, category: "Operations", title: "สินค้าคงคลัง-หน้าร้านถูกต้อง", person: "พนักงานขายปลีก", target: 90, actual: 67, unit: "%", type: "more" },
            { id: 10, category: "Operations", title: "สินค้าคงคลัง-หนองคายถูกต้อง", person: "หัวหน้าแผนกขาย/พนักงานขาย-หนองคาย", target: 95, actual: 96, unit: "%", type: "more" },
            { id: 11, category: "Operations", title: "ประสิทธิภาพการใช้รถบรรทุก", person: "หัวหน้าแผนกคลังสินค้าจัดส่ง", target: 85, actual: 90.71, unit: "%", type: "more" },
            { id: 12, category: "Operations", title: "สินค้าคงคลัง-คลังสินค้าถูกต้อง", person: "หัวหน้าแผนกคลังสินค้าจัดส่ง/พนักงาน", target: 85, actual: 71, unit: "%", type: "more" },

            // --- หมวดหมู่: ข้อผิดพลาด (Errors - Less is Better) ---
            { id: 13, category: "Errors", title: "ข้อผิดพลาดการสื่อสาร", person: "หัวหน้าแผนกขาย", target: 2, actual: 1, unit: "ครั้ง", type: "less" },
            { id: 14, category: "Errors", title: "ข้อผิดพลาดการสื่อสาร", person: "พนักงานขายส่ง", target: 2, actual: 1, unit: "ครั้ง", type: "less" },
            { id: 15, category: "Errors", title: "ข้อผิดพลาดการจัดส่ง", person: "พนักงานจัดส่ง ไชยา", target: 2, actual: 1, unit: "ครั้ง", type: "less" },
            { id: 16, category: "Errors", title: "ข้อผิดพลาดการจัดส่ง", person: "พนักงานจัดส่ง สุมาต", target: 2, actual: 0, unit: "ครั้ง", type: "less" },
            { id: 17, category: "Errors", title: "ข้อผิดพลาดการจัดส่ง", person: "พนักงานจัดส่ง หนุ่ย", target: 2, actual: 0, unit: "ครั้ง", type: "less" },
            { id: 18, category: "Errors", title: "ข้อผิดพลาดการจัดส่ง", person: "พนักงานจัดส่ง สุรชัย", target: 2, actual: 1, unit: "ครั้ง", type: "less" },
            { id: 19, category: "Errors", title: "ข้อผิดพลาดการจัดส่ง", person: "พนักงานจัดส่ง นาวี", target: 2, actual: 0, unit: "ครั้ง", type: "less" },
            { id: 20, category: "Errors", title: "ข้อผิดพลาดการจัดส่ง", person: "พนักงานจัดส่ง วิชัย", target: 2, actual: 0, unit: "ครั้ง", type: "less" },
            { id: 21, category: "Errors", title: "ข้อผิดพลาดการจัดส่ง", person: "พนักงานขับรถ บูรพา", target: 2, actual: 0, unit: "ครั้ง", type: "less" },
            { id: 22, category: "Errors", title: "ข้อผิดพลาดการจัดส่ง", person: "พนักงานจัดส่ง ใย", target: 2, actual: 1, unit: "ครั้ง", type: "less" },
            { id: 23, category: "Errors", title: "ข้อผิดพลาดการจัดส่ง", person: "พนักงานขับรถ เรืองยศ", target: 2, actual: 1, unit: "ครั้ง", type: "less" },

            // --- หมวดหมู่: ประสิทธิภาพเชื้อเพลิง (Fuel Efficiency) ---
            { id: 24, category: "Fuel", title: "ประสิทธิภาพใช้เชื้อเพลิง", person: "พนักงานขับรถ บุญหนัก", target: 7.00, actual: 8.04, unit: "km/ลิตร", type: "more" },
            { id: 25, category: "Fuel", title: "ประสิทธิภาพใช้เชื้อเพลิง", person: "พนักงานขับรถ ทำเงิน", target: 6.80, actual: 6.23, unit: "km/ลิตร", type: "more" },
            { id: 26, category: "Fuel", title: "ประสิทธิภาพใช้เชื้อเพลิง", person: "พนักงานขับรถ พี่หมาน", target: 8.70, actual: 8.36, unit: "km/ลิตร", type: "more" },
            { id: 27, category: "Fuel", title: "ประสิทธิภาพใช้เชื้อเพลิง", person: "พนักงานขับรถ นำโชค", target: 9.50, actual: 9.82, unit: "km/ลิตร", type: "more" },
            { id: 28, category: "Fuel", title: "ประสิทธิภาพใช้เชื้อเพลิง", person: "พนักงานขับรถ ออมสิน", target: 11.80, actual: 14.20, unit: "km/ลิตร", type: "more" }
        ];

        // Format Numbers
        const fmt = (num) => new Intl.NumberFormat('th-TH', { maximumFractionDigits: 2 }).format(num);

        // Calculate Overview Stats
        let passed = 0;
        let failed = 0;

        kpiData.forEach(item => {
            const isPass = item.type === "more" ? item.actual >= item.target : item.actual <= item.target;
            if (isPass) passed++; else failed++;
            item.isPass = isPass;
        });

        document.getElementById('stat-passed').innerText = passed;
        document.getElementById('stat-failed').innerText = failed;

        // Render KPI Cards Function
        function renderCards(data) {
            return data.map(kpi => {
                const percent = kpi.type === "more" 
                    ? Math.min((kpi.actual / kpi.target) * 100, 100) 
                    : (kpi.actual <= kpi.target ? 100 : 0); // For errors, simplify logic for bar

                const statusColor = kpi.isPass ? "text-green-600" : "text-red-500";
                const bgColor = kpi.isPass ? "bg-green-100" : "bg-red-100";
                const barColor = kpi.isPass ? "bg-green-500" : "bg-red-500";
                const icon = kpi.isPass ? "check" : "x";

                // Progress Bar or Badge Display
                let visualDisplay = '';
                if (kpi.type === "more") {
                    visualDisplay = `
                        <div class="w-full bg-gray-200 rounded-full h-2 mt-3 mb-1 overflow-hidden">
                            <div class="${barColor} h-2 rounded-full transition-all duration-1000" style="width: ${percent}%"></div>
                        </div>
                        <div class="flex justify-between text-xs text-gray-500 font-medium">
                            <span>Target: ${fmt(kpi.target)}</span>
                            <span>${percent.toFixed(1)}%</span>
                        </div>
                    `;
                } else {
                    // For "Errors" (Less is better)
                    visualDisplay = `
                        <div class="mt-3 flex items-center gap-2">
                            <span class="text-xs text-gray-500 font-medium">เป้าหมาย: ไม่เกิน ${kpi.target}</span>
                            <div class="flex-1 border-t border-dashed border-gray-300"></div>
                            <span class="text-xs px-2 py-1 rounded-md font-medium ${kpi.isPass ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                ${kpi.isPass ? 'ผ่านเกณฑ์' : 'เกินกำหนด'}
                            </span>
                        </div>
                    `;
                }

                return `
                    <div class="glass-card rounded-2xl p-5 flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start mb-2">
                                <h4 class="font-semibold text-gray-800 text-sm mb-1 line-clamp-2" title="${kpi.title}">${kpi.title}</h4>
                                <div class="shrink-0 ml-2 w-6 h-6 rounded-full ${bgColor} ${statusColor} flex items-center justify-center">
                                    <i data-lucide="${icon}" class="w-4 h-4"></i>
                                </div>
                            </div>
                            <p class="text-xs text-gray-500 mb-4 flex items-center gap-1">
                                <i data-lucide="user" class="w-3 h-3"></i> ${kpi.person}
                            </p>
                        </div>
                        
                        <div>
                            <div class="flex items-end gap-1">
                                <span class="text-2xl font-bold ${statusColor}">${fmt(kpi.actual)}</span>
                                <span class="text-xs text-gray-500 mb-1">${kpi.unit}</span>
                            </div>
                            ${visualDisplay}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Group Definitions
        const categories = [
            { id: "Sales", title: "ยอดขายและการเติบโต (Sales & Growth)", icon: "dollar-sign", color: "text-emerald-600" },
            { id: "Operations", title: "สินค้าคงคลังและการดำเนินงาน (Inventory & Ops)", icon: "package", color: "text-blue-600" },
            { id: "Fuel", title: "ประสิทธิภาพการใช้เชื้อเพลิง (Fuel Efficiency)", icon: "fuel", color: "text-orange-500" },
            { id: "Errors", title: "ข้อผิดพลาดในการทำงาน (Work Errors)", icon: "alert-triangle", color: "text-rose-500" }
        ];

        const container = document.getElementById('kpi-container');

        // Render Categories and Cards
        categories.forEach(cat => {
            const catData = kpiData.filter(d => d.category === cat.id);
            if(catData.length === 0) return;

            const sectionHtml = `
                <section>
                    <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2 border-b border-gray-200/50 pb-2">
                        <i data-lucide="${cat.icon}" class="w-6 h-6 ${cat.color}"></i>
                        ${cat.title}
                    </h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                        ${renderCards(catData)}
                    </div>
                </section>
            `;
            container.insertAdjacentHTML('beforeend', sectionHtml);
        });

        // Re-initialize icons for newly added HTML
        lucide.createIcons();

        // Prepare Data for Chart (Top Sales Categories)
        const salesChartData = kpiData.filter(d => d.category === 'Sales' && d.id !== 4 && d.id !== 2); // Exclude small ones for clearer chart view, or keep specific ones
        const chartLabels = ['ออนไลน์', 'หน้าร้าน', 'ขายส่ง', 'หนองคาย'];
        const targetData = [650000, 600000, 12800000, 600000];
        const actualData = [1191760, 467577, 12592895, 828356];

        // Init Chart.js
        const ctx = document.getElementById('salesChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: chartLabels,
                datasets: [
                    {
                        label: 'เป้าหมาย (Target)',
                        data: targetData,
                        backgroundColor: 'rgba(148, 163, 184, 0.4)',
                        borderColor: 'rgba(148, 163, 184, 1)',
                        borderWidth: 1,
                        borderRadius: 6
                    },
                    {
                        label: 'ทำได้จริง (Actual)',
                        data: actualData,
                        backgroundColor: 'rgba(59, 130, 246, 0.8)',
                        borderColor: 'rgba(37, 99, 235, 1)',
                        borderWidth: 1,
                        borderRadius: 6
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'top',
                        labels: { font: { family: 'Prompt' } }
                    },
                    tooltip: {
                        titleFont: { family: 'Prompt' },
                        bodyFont: { family: 'Prompt' },
                        callbacks: {
                            label: function(context) {
                                return context.dataset.label + ': ' + new Intl.NumberFormat('th-TH').format(context.raw) + ' บาท';
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            font: { family: 'Prompt' },
                            callback: function(value) {
                                if (value >= 1000000) return (value / 1000000) + 'M';
                                if (value >= 1000) return (value / 1000) + 'k';
                                return value;
                            }
                        },
                        grid: { color: 'rgba(0,0,0,0.05)' }
                    },
                    x: {
                        ticks: { font: { family: 'Prompt' } },
                        grid: { display: false }
                    }
                }
            }
        });
    </script>
</body>
</html>
