<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPIs ติดตามผลการดำเนินงานรายบุคคล 2026 - บริษัท พัฒนาสิน ไทยเทรดดิ้ง จำกัด</title>
    <!-- โหลด Tailwind CSS สำหรับจัดการหน้าตาเว็บ -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- โหลด Font Prompt จาก Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- โหลด Lucide Icons สำหรับรูปไอคอน -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #111827; /* ปรับสีพื้นหลัง Body เป็นสีเข้ม */
        }
    </style>
</head>
<body id="appBody" class="text-gray-100 bg-gray-900 antialiased min-h-screen flex flex-col transition-colors duration-700">

    <!-- แถบด้านบน (Header) -->
    <header class="bg-gray-800 text-white shadow-md border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <h1 class="text-2xl md:text-3xl font-bold tracking-wide">บริษัท พัฒนาสิน ไทยเทรดดิ้ง จำกัด</h1>
            <p class="mt-2 text-blue-400 text-lg">ระบบติดตามผลการดำเนินงานรายบุคคล (KPIs) ประจำปี 2026</p>
        </div>
    </header>

    <!-- ส่วนเนื้อหาหลัก (Main Content) -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <!-- ส่วนตัวกรองเดือน (Month Filter) -->
        <div class="bg-gray-800 rounded-lg shadow-sm p-4 mb-8 flex flex-col sm:flex-row items-start sm:items-center justify-between border-l-4 border-blue-500">
            <div class="mb-4 sm:mb-0">
                <h2 class="text-xl font-semibold flex items-center text-gray-100">
                    <i data-lucide="calendar" class="mr-2 text-blue-400"></i>
                    เลือกเดือนที่ต้องการดูข้อมูล
                </h2>
                <p class="text-sm text-gray-400 mt-1">กรุณาเลือกเดือนเพื่อดูผลประเมินของแต่ละหัวข้อ</p>
            </div>
            <div class="w-full sm:w-auto">
                <select id="monthSelector" class="w-full sm:w-64 bg-gray-700 border border-gray-600 text-white text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 shadow-sm">
                    <option value="01">มกราคม (January)</option>
                    <option value="02">กุมภาพันธ์ (February)</option>
                    <option value="03">มีนาคม (March)</option>
                    <option value="04">เมษายน (April)</option>
                    <option value="05">พฤษภาคม (May)</option>
                    <option value="06">มิถุนายน (June)</option>
                    <option value="07">กรกฎาคม (July)</option>
                    <option value="08">สิงหาคม (August)</option>
                    <option value="09">กันยายน (September)</option>
                    <option value="10">ตุลาคม (October)</option>
                    <option value="11">พฤศจิกายน (November)</option>
                    <option value="12">ธันวาคม (December)</option>
                </select>
            </div>
        </div>

        <!-- รายการหัวข้อ KPI (KPI Topics Grid) -->
        <h3 class="text-lg font-bold mb-4 text-gray-200 border-b border-gray-700 pb-2">หัวข้อการประเมิน (15 หมวดหมู่)</h3>
        <div id="kpiGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- ข้อมูลจะถูกสร้างผ่าน JavaScript -->
        </div>

    </main>

    <!-- แถบด้านล่าง (Footer) -->
    <footer class="bg-gray-950 text-gray-500 py-6 text-center text-sm border-t border-gray-800">
        <p>&copy; 2026 บริษัท พัฒนาสิน ไทยเทรดดิ้ง จำกัด. สงวนลิขสิทธิ์.</p>
        <p class="mt-1">ระบบติดตาม KPIs ภายในองค์กร</p>
    </footer>

    <!-- JavaScript สำหรับจัดการการทำงาน -->
    <script>
        // ข้อมูล 15 หัวข้อ KPI พร้อมไอคอน และ ลิงก์ (เพิ่มคุณสมบัติ url เข้ามา)
        const kpiTopics = [
            { id: 1, title: "ยอดขายของลูกค้าจากช่องทางออนไลน์", url: "onlinesales.html", icon: "shopping-cart", color: "text-blue-400", bg: "bg-blue-900/40" },
            { id: 2, title: "ยอดขายของสินค้าในกลุ่มสินค้าใหม่", url: "newproduct.html", icon: "package-plus", color: "text-emerald-400", bg: "bg-emerald-900/40" },
            { id: 3, title: "ฝึกอบรมพนักงานให้มีความรู้-ทักษะ", url: "trainingemployee.html", icon: "graduation-cap", color: "text-purple-400", bg: "bg-purple-900/40" },
            { id: 4, title: "ยอดขายของลูกค้าใหม่", url: "newcustomersales.html", icon: "user-plus", color: "text-amber-400", bg: "bg-amber-900/40" },
            { id: 5, title: "การติดตามการชำระหนี้ของลูกค้า", url: "debtTracking.html", icon: "badge-dollar-sign", color: "text-red-400", bg: "bg-red-900/40" },
            { id: 6, title: "ยอดขายปลีกหน้าร้าน", url: "retailsales.html", icon: "store", color: "text-indigo-400", bg: "bg-indigo-900/40" },
            { id: 7, title: "ยอดขายส่ง", url: "wholesales.html", icon: "boxes", color: "text-cyan-400", bg: "bg-cyan-900/40" },
            { id: 8, title: "ยอดขาย-หนองคาย", url: "nksales.html", icon: "map-pin", color: "text-teal-400", bg: "bg-teal-900/40" },
            { id: 9, title: "สินค้าคงคลัง-หน้าร้าน", url: "stockretail.html", icon: "package", color: "text-orange-400", bg: "bg-orange-900/40" },
            { id: 10, title: "สินค้าคงคลัง-โกดัง", url: "stockwarehouse.html", icon: "warehouse", color: "text-fuchsia-400", bg: "bg-fuchsia-900/40" },
            { id: 11, title: "สินค้าคงคลัง-หนองคาย", url: "stocknk.html", icon: "map", color: "text-rose-400", bg: "bg-rose-900/40" },
            { id: 12, title: "ประสิทธิภาพการใช้รถบรรทุกสินค้า", url: "caruseefficiency.html", icon: "truck", color: "text-lime-400", bg: "bg-lime-900/40" },
            { id: 13, title: "ข้อผิดพลาดจากการสื่อสารในแต่ละเดือน", url: "communication.html", icon: "message-square-warning", color: "text-yellow-400", bg: "bg-yellow-900/40" },
            { id: 14, title: "ข้อผิดพลาดจากการจัดส่งสินค้าในแต่ละเดือน", url: "deliveryError.html", icon: "package-x", color: "text-pink-400", bg: "bg-pink-900/40" },
            { id: 15, title: "ประสิทธิภาพการใช้เชื้อเพลิง", url: "fuelefficiency.html", icon: "fuel", color: "text-slate-400", bg: "bg-slate-800" }
        ];

        const gridContainer = document.getElementById('kpiGrid');
        const monthSelector = document.getElementById('monthSelector');
        const appBody = document.getElementById('appBody');

        // สีพื้นหลังตามเดือน (โทนเข้ม 950 เพื่อให้เข้ากับ Dark Theme)
        const monthBgColors = {
            "01": "bg-slate-900",     // มกราคม (สีเทาเข้ม)
            "02": "bg-rose-950",      // กุมภาพันธ์ (สีชมพู/แดงเข้ม)
            "03": "bg-emerald-950",   // มีนาคม (สีเขียวมรกตเข้ม)
            "04": "bg-red-950",       // เมษายน (สีแดงเข้ม)
            "05": "bg-amber-950",     // พฤษภาคม (สีเหลืองอำพันเข้ม)
            "06": "bg-lime-950",      // มิถุนายน (สีเขียวมะนาวเข้ม)
            "07": "bg-sky-950",       // กรกฎาคม (สีฟ้าเข้ม)
            "08": "bg-cyan-950",      // สิงหาคม (สีฟ้าอมเขียวเข้ม)
            "09": "bg-fuchsia-950",   // กันยายน (สีบานเย็นเข้ม)
            "10": "bg-orange-950",    // ตุลาคม (สีส้มเข้ม)
            "11": "bg-indigo-950",    // พฤศจิกายน (สีครามเข้ม)
            "12": "bg-teal-950"       // ธันวาคม (สีเขียวอมฟ้าเข้ม)
        };
        let currentBgClass = "bg-gray-900"; // สีเริ่มต้น

        // ฟังก์ชันเปลี่ยนสีพื้นหลัง
        function updateBackgroundColor(month) {
            const newBgClass = monthBgColors[month] || "bg-gray-900";
            appBody.classList.remove(currentBgClass);
            appBody.classList.add(newBgClass);
            currentBgClass = newBgClass;
        }

        // ฟังก์ชันสร้างการ์ด KPI
        function renderKPIs() {
            const selectedMonth = monthSelector.value;
            gridContainer.innerHTML = ''; // ล้างข้อมูลเดิม

            kpiTopics.forEach((topic, index) => {
                // เช็คว่าลิงก์เป็นเว็บภายนอก (http) หรือไฟล์ภายใน 
                // ปรับปรุงใหม่: สร้างลิงก์ชี้ไปยังโฟลเดอร์ของเดือนนั้นๆ ตามโครงสร้างของคุณ
                // เช่น ถ้าเลือกเดือน 01 จะได้ลิงก์เป็น month01/index.html
                let linkUrl = topic.url;
                if (!linkUrl.startsWith('http')) {
                    linkUrl = `month${selectedMonth}/${topic.url}`;
                }
                
                const cardHTML = `
                    <a href="${linkUrl}" class="group block bg-gray-800 rounded-xl shadow-sm border border-gray-700 p-5 hover:shadow-md hover:border-gray-600 hover:-translate-y-1 transition-all duration-300 relative overflow-hidden h-full flex flex-col justify-between">
                        <div class="absolute top-0 right-0 w-16 h-16 ${topic.bg} rounded-bl-full -mr-8 -mt-8 transition-transform group-hover:scale-110"></div>
                        
                        <div class="relative z-10 flex items-start space-x-4">
                            <div class="flex-shrink-0 p-3 ${topic.bg} rounded-lg ${topic.color}">
                                <i data-lucide="${topic.icon}" class="w-6 h-6"></i>
                            </div>
                            <div>
                                <span class="text-xs font-semibold text-gray-400 mb-1 block">หัวข้อที่ ${index + 1}</span>
                                <h4 class="text-sm md:text-base font-medium text-gray-100 group-hover:text-blue-400 transition-colors line-clamp-3">
                                    ${topic.title}
                                </h4>
                            </div>
                        </div>
                        
                        <div class="relative z-10 mt-4 pt-4 border-t border-gray-700 flex justify-between items-center text-xs text-gray-400">
                            <span>ดูข้อมูลรายละเอียด</span>
                            <i data-lucide="chevron-right" class="w-4 h-4 group-hover:translate-x-1 transition-transform text-blue-400"></i>
                        </div>
                    </a>
                `;
                gridContainer.insertAdjacentHTML('beforeend', cardHTML);
            });

            // เรียกใช้ Lucide icons ใหม่หลังจาก render
            lucide.createIcons();
        }

        // เมื่อมีการเปลี่ยนเดือน ให้ทำการอัพเดทลิงก์ในการ์ด
        monthSelector.addEventListener('change', () => {
            const monthName = monthSelector.options[monthSelector.selectedIndex].text;
            const selectedMonth = monthSelector.value;
            console.log(`เดือนที่เลือกปัจจุบัน: ${monthName}`);
            
            updateBackgroundColor(selectedMonth); // เปลี่ยนสีพื้นหลัง
            renderKPIs(); // Re-render เพื่ออัพเดท parameter ใน URL ของลิงก์
        });

        // กำหนดเดือนปัจจุบันเป็นค่าเริ่มต้น (ถ้าต้องการ) และสร้างการ์ดครั้งแรก
        document.addEventListener('DOMContentLoaded', () => {
            const currentMonth = new Date().getMonth() + 1;
            const monthStr = currentMonth.toString().padStart(2, '0');
            // ลองตั้งค่าเดือนปัจจุบัน (ยกเลิก comment บรรทัดล่างถ้าต้องการให้ select อัตโนมัติ)
            // monthSelector.value = monthStr; 
            
            updateBackgroundColor(monthSelector.value); // เซ็ตสีพื้นหลังครั้งแรก
            renderKPIs();
        });
    </script>
</body>
</html>
